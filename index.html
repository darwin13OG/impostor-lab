<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Impostor - Juego de Fiesta</title>
    
    <!-- Librería PeerJS (Para el modo local gratis) -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    
    <!-- Enlace a tus estilos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Botón Instalar -->
    <button id="btn-instalar-pwa">📥 Instalar App</button>

    <div class="game-container">
        
        <!-- MENÚ PRINCIPAL -->
        <div id="screen-menu" class="screen active">
            <div style="text-align: center;">
                <img src="icono.png" alt="Logo" class="main-logo">
                <h1>EL <span>IMPOSTOR</span></h1>
                <p class="subtitle">Selecciona el modo de juego</p>
                <div style="margin-top: 1.5rem;">
                    <button class="btn" onclick="startSinglePlayer()">📱 Un solo celular</button>
                    <button class="btn btn-secondary" onclick="switchScreen('screen-multi-choice')">🌐 Varios celulares</button>
                </div>
            </div>
        </div>

        <!-- SECCIÓN MODO LOCAL (MULTIJUGADOR) -->
        <div id="screen-multi-choice" class="screen">
            <div>
                <h1>MODO <span>LOCAL</span></h1>
                <p class="subtitle">¿Cómo van a jugar?</p>
                
                <div class="setup-group">
                    <input type="text" id="multi-name" placeholder="Tu nombre..." class="name-input-field">
                </div>

                <div class="option-grid">
                    <div class="option-card selected" id="opt-cards" onclick="setMultiMode('cards')">
                        🃏 Tarjetas
                        <div class="mini-desc">Están cerca hablando</div>
                    </div>
                    <div class="option-card" id="opt-chat" onclick="setMultiMode('chat')">
                        💬 Chat
                        <div class="mini-desc">Están lejos (Escriben)</div>
                    </div>
                </div>

                <button class="btn" onclick="hostGame()">Crear Partida (Host)</button>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="join-id" placeholder="Código" class="code-input-field">
                    <button class="btn" style="width:50%; margin:0;" onclick="joinGame()">Unirse</button>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="switchScreen('screen-menu')">Volver</button>
        </div>

        <!-- PANTALLA SETUP (SINGLE PLAYER) -->
        <div id="screen-setup" class="screen">
            <div>
                <h1>AJUSTES</h1>
                <div class="setup-group">
                    <span class="label-purple">JUGADORES</span>
                    <div class="num-selector">
                        <button class="btn-small" onclick="changeCount(-1)">-</button>
                        <span id="player-count-val">4</span>
                        <button class="btn-small" onclick="changeCount(1)">+</button>
                    </div>
                </div>
                <div id="cat-grid-single" class="option-grid"></div>
            </div>
            <button class="btn" onclick="goToNames()">Continuar</button>
        </div>

        <!-- PANTALLA NOMBRES -->
        <div id="screen-names" class="screen">
            <div>
                <h1>NOMBRES</h1>
                <div id="names-container" class="scroll-area"></div>
            </div>
            <button class="btn" onclick="initSingleGame()">Comenzar</button>
        </div>

        <!-- PANTALLA REVELADO -->
        <div id="screen-reveal" class="screen">
            <div style="text-align:center;">
                <p class="subtitle" id="reveal-instr">Pasa el teléfono a:</p>
                <h1 id="reveal-name">---</h1>
                <div class="press-pad" id="main-pad">MANTÉN</div>
                <div class="word-box">
                    <div id="word-display" style="display:none;"></div>
                    <div id="word-hint">Presiona para ver tu rol</div>
                </div>
            </div>
            <button class="btn" id="btn-reveal-ok" style="display:none;" onclick="nextReveal()">Entendido</button>
        </div>

        <!-- PANTALLA DEBATE -->
        <div id="screen-debate" class="screen">
            <div>
                <h1>DEBATE</h1>
                <div class="timer-display" id="timer-val">02:00</div>
                <div id="host-controls" style="display:none;">
                    <button class="btn-secondary" onclick="showVoting()">Lanzar Votación</button>
                </div>
            </div>
            <button class="btn" id="btn-manual-vote" onclick="showVoting()">Ir a Votar</button>
        </div>

        <!-- PANTALLA VOTACIÓN -->
        <div id="screen-vote" class="screen">
            <div>
                <h1>VOTACIÓN</h1>
                <p class="subtitle">¿A quién quieren expulsar?</p>
                <div id="vote-list" class="scroll-area"></div>
            </div>
            <button class="btn" id="btn-confirm-vote" disabled onclick="confirmVote()">Confirmar Voto</button>
        </div>

        <!-- PANTALLA RESULTADO -->
        <div id="screen-result" class="screen">
            <div style="text-align:center;">
                <div id="res-icon" style="font-size:4rem;">🕵️‍♂️</div>
                <h1 id="res-title">RESULTADO</h1>
                <p id="res-desc" class="subtitle"></p>
                <div class="setup-group" id="res-summary"></div>
            </div>
            <button class="btn" onclick="location.reload()">Volver al Inicio</button>
        </div>

    </div>

    <!-- Enlace a tu lógica de juego -->
    <script src="script.js"></script>
</body>
</html>
