<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Impostor - Shadow Games</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="btn-instalar-pwa">📥 Instalar</button>

    <div id="custom-alert" class="alert-overlay">
        <div class="alert-box">
            <p id="alert-msg">Mensaje</p>
            <button class="btn" onclick="closeAlert()">Aceptar</button>
        </div>
    </div>

    <div class="game-container">
        
        <!-- MENÚ PRINCIPAL -->
        <div id="screen-menu" class="screen active">
            <div style="text-align: center;">
                <img src="icono.png" alt="Logo" class="main-logo">
                <h1>EL <span>IMPOSTOR</span></h1>
                <p class="subtitle">Descubre al infiltrado</p>
                <div style="margin-top: 1rem;">
                    <button class="btn" onclick="startSinglePlayer()">📱 Un solo celular</button>
                    <button class="btn btn-secondary" onclick="switchScreen('screen-multi-choice')">🌐 Varios celulares</button>
                </div>
            </div>
            <div class="footer-info">
                <p>By Shadow</p>
                <p>© 2026 Shadow Studio</p>
            </div>
        </div>

        <!-- MODO LOCAL -->
        <div id="screen-multi-choice" class="screen">
            <div>
                <h1>MODO <span>LOCAL</span></h1>
                <div class="setup-group">
                    <span class="label-purple">TU APODO</span>
                    <input type="text" id="multi-name" placeholder="Tu nombre..." class="name-input-field">
                </div>
                <div class="option-grid">
                    <div class="option-card selected" id="opt-cards" onclick="setMultiMode('cards')">🃏 Tarjetas</div>
                    <div class="option-card" id="opt-chat" onclick="setMultiMode('chat')">💬 Chat</div>
                </div>
                <button class="btn" onclick="hostGame()">Crear Partida</button>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="join-id" placeholder="CÓDIGO" class="code-input-field">
                    <button class="btn" style="width:50%; margin:0;" onclick="joinGame()">Unirse</button>
                </div>
            </div>
            <button class="btn-text" onclick="switchScreen('screen-menu')">← Volver al inicio</button>
        </div>

        <!-- SETUP SINGLE PLAYER -->
        <div id="screen-setup" class="screen">
            <div>
                <h1>AJUSTES</h1>
                <div class="setup-group">
                    <span class="label-purple">JUGADORES</span>
                    <div class="num-selector">
                        <button class="btn-small" onclick="changeCount(-1)">-</button>
                        <span id="player-count-val">4</span>
                        <button class="btn-small" onclick="changeCount(1)">+</button>
                    </div>
                </div>
                <span class="label-purple">CATEGORÍA</span>
                <div id="cat-grid-single" class="option-grid"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="switchScreen('screen-menu')">Atrás</button>
                <button class="btn" onclick="goToNames()">Continuar</button>
            </div>
        </div>

        <!-- NOMBRES -->
        <div id="screen-names" class="screen">
            <div>
                <h1>NOMBRES</h1>
                <div id="names-container" class="scroll-area"></div>
            </div>
            <button class="btn" onclick="initSingleGame()">Comenzar</button>
        </div>

        <!-- REVELADO (MEJORADO) -->
        <div id="screen-reveal" class="screen">
            <div style="text-align:center;">
                <p class="subtitle" id="reveal-instr">Pasa el teléfono a:</p>
                <h1 id="reveal-name">---</h1>
                <div class="press-pad" id="main-pad">
                    <span id="pad-label">MANTÉN</span>
                </div>
                <div class="word-box">
                    <div id="word-display" style="display:none;"></div>
                    <div id="word-hint">Presiona una única vez para ver tu rol</div>
                </div>
            </div>
            <button class="btn" id="btn-reveal-ok" style="display:none;" onclick="nextReveal()">Entendido</button>
        </div>

        <!-- DEBATE (CON CONTROLES) -->
        <div id="screen-debate" class="screen">
            <div>
                <h1>DEBATE</h1>
                <div class="timer-display" id="timer-val">02:00</div>
                <div class="timer-controls">
                    <button class="btn-small" onclick="alterTimer(-30)">-30</button>
                    <button class="btn-small" id="pause-btn" onclick="togglePause()">⏸</button>
                    <button class="btn-small" onclick="alterTimer(30)">+30</button>
                </div>
            </div>
            <button class="btn" onclick="showVoting()">Votar</button>
        </div>

        <!-- VOTACIÓN -->
        <div id="screen-vote" class="screen">
            <div>
                <h1>VOTACIÓN</h1>
                <div id="vote-list" class="scroll-area"></div>
            </div>
            <button class="btn" id="btn-confirm-vote" disabled onclick="confirmVote()">Confirmar</button>
        </div>

        <!-- RESULTADO -->
        <div id="screen-result" class="screen">
            <div style="text-align:center;">
                <div id="res-icon" style="font-size:4rem;">🕵️‍♂️</div>
                <h1 id="res-title">---</h1>
                <div class="setup-group" id="res-summary"></div>
            </div>
            <button class="btn" onclick="location.reload()">Inicio</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
